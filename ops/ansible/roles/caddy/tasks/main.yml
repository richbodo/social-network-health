---
# Caddy is not in Ubuntu's default repos — add the official Cloudsmith apt repo.
- name: Download Caddy apt signing key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /tmp/caddy-stable.gpg.key
    mode: "0644"

- name: Install Caddy apt signing key (dearmored)
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /tmp/caddy-stable.gpg.key
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

- name: Add Caddy stable apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/caddy-stable.list
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible (ops/ansible roles/caddy). Do not edit by hand.
      deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true

- name: Ensure site root exists (operator-owned for rsync deploys)
  ansible.builtin.file:
    path: "{{ site_root }}"
    state: directory
    owner: "{{ operator_user }}"
    group: "{{ operator_user }}"
    mode: "0755"

- name: Deploy Caddy site config
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    validate: caddy validate --config %s --adapter caddyfile
  notify: Restart caddy

- name: Ensure Caddy is enabled and running
  ansible.builtin.service:
    name: caddy
    state: started
    enabled: true
