# Self-contained Ansible for the socialnetwork.health static-site droplet.
# Run from the ops/ansible directory:
#   ansible-playbook site.yml
#
# Connects as root (fresh DigitalOcean droplets expose root via your SSH key;
# our SSH hardening keeps root key-login working via PermitRootLogin
# prohibit-password). Because we connect as root, no sudo password is ever
# needed — `become` is a no-op escalation.
[defaults]
inventory = inventory/hosts.ini
interpreter_python = auto_silent
retry_files_enabled = False
collections_path = collections:~/.ansible/collections
log_path = ansible.log

[privilege_escalation]
become = true
become_method = sudo

[ssh_connection]
# Fresh public-IP droplets get hammered by SSH scanner bots, which intermittently
# trips sshd's MaxStartups and drops the handshake ("Exceeded MaxStartups").
# Retry the connection so a transient drop doesn't fail the whole play. The
# sshd hardening raises MaxStartups and fail2ban bans repeat offenders, so this
# noise subsides after the first bootstrap.
retries = 8
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ConnectionAttempts=3 -o ServerAliveInterval=15
